name: ECHL Transactions

on:
  schedule:
    # 11pm UTC daily (7pm ET)
    - cron: "0 23 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  transactions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper dependencies
        run: npm install
        working-directory: scripts

      - name: Seed rosters if not yet seeded
        run: |
          if [ ! -f client/public/data/rosters/74.json ]; then
            echo "No roster data found — running seed..."
            node scripts/seed-rosters.js
          else
            echo "Roster data already exists, skipping seed."
          fi

      - name: Run transaction agent
        run: |
          if [ ! -f client/public/data/rosters/74.json ]; then
            echo "Seeding just completed — backfilling last 7 days..."
            node scripts/agent-transactions.js --days 7
          else
            node scripts/agent-transactions.js
          fi

      - name: Commit and push changed data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/
          if git diff --cached --quiet; then
            echo "No transaction changes to commit."
          else
            git commit -m "chore: update ECHL rosters [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
