name: Scrape ECHL Data

on:
  schedule:
    # Daily at 10:30 UTC (6:30am ET / shifted 3h earlier)
    - cron: "30 10 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper dependencies
        run: npm install
        working-directory: scripts

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Compute fighting majors
        run: node scripts/compute-fighting-majors.js

      - name: Commit and push changed data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update ECHL data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
